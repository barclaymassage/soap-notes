<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Clinical Manager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; flex-direction: column; position: relative; z-index: 100; }
        #appContent { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #main { flex-grow: 1; padding: 25px; overflow-y: auto; padding-bottom: 150px; }
        .map-section { background: #eaeff2; padding: 15px; border-radius: 12px; margin-bottom: 20px; max-width: 800px; margin: 0 auto; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .zone-btn { padding: 10px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .soap-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 80px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 18px; }
        .client-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .active-client { background: var(--accent) !important; color: white; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>Clinic Access</h2>
    <input type="password" id="pinField" style="padding:15px; text-align:center; font-size:24px; border-radius:8px;" placeholder="PIN" inputmode="numeric">
    <button class="btn" style="width:150px; margin-top:10px;" onclick="checkPin()">Unlock</button>
</div>

<div id="appContent">
    <div id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee;">
            <input type="text" id="searchBar" placeholder="Search..." oninput="renderList()" style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="text" id="newName" placeholder="New Client" style="width:100%; padding:8px;">
            <button class="btn" style="background:var(--accent); color:white; width:100%; margin-top:5px;" onclick="addClient()">+ Add Client</button>
        </div>
        <div id="clientList" style="flex-grow:1; overflow-y:auto;"></div>
        <button class="btn" style="margin:10px; font-size:10px;" onclick="exportData()">💾 Backup</button>
    </div>

    <div id="main">
        <div id="clientView" style="display:none;">
            <h1 id="activeTitle">Client</h1>
            <div class="map-section">
                <div class="map-grid">
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <span style="font-size:10px; text-align:center;">FRONT</span>
                        <button class="zone-btn" onclick="tapZone('Neck')">Neck</button>
                        <button class="zone-btn" onclick="tapZone('Chest')">Chest</button>
                        <button class="zone-btn" onclick="tapZone('Quads')">Quads</button>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <span style="font-size:10px; text-align:center;">BACK</span>
                        <button class="zone-btn" onclick="tapZone('Traps')">Traps</button>
                        <button class="zone-btn" onclick="tapZone('Low Back')">Low Back</button>
                        <button class="zone-btn" onclick="tapZone('Glutes')">Glutes</button>
                    </div>
                </div>
            </div>
            <div class="soap-card">
                <label>S (Subjective)</label>
                <select onchange="addText('s', this.value); this.value='';">
                    <option value="">-- Quick S --</option>
                    <option value="Reports localized pain.">Localized Pain</option>
                    <option value="Pain level 5/10.">Pain 5/10</option>
                </select>
                <textarea id="s"></textarea>
                <label>O (Objective)</label>
                <textarea id="o"></textarea>
                <label>P (Plan)</label>
                <textarea id="p"></textarea>
                <button class="btn btn-save" onclick="saveNote()">SAVE SESSION</button>
            </div>
            <div id="history"></div>
        </div>
    </div>
</div>

<script>
    // OFFLINE LOGIC
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `));
        });
    }

    let db, currentId = null;

    function checkPin() {
        const pin = document.getElementById('pinField').value;
        if (pin === '1234') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
            initDB();
        } else {
            alert("Wrong PIN");
        }
    }

    function tapZone(zone) {
        addText('s', zone + ":");
        addText('o', zone + ":");
    }

    function addText(id, text) {
        const el = document.getElementById(id);
        el.value += (el.value ? " " : "") + text;
    }

    function initDB() {
        const req = indexedDB.open("ClinicDB_Final", 1);
        req.onupgradeneeded = e => {
            let d = e.target.result;
            d.createObjectStore("clients", {keyPath: "id", autoIncrement: true});
            d.createObjectStore("notes", {keyPath: "id", autoIncrement: true}).createIndex("cId", "cId");
        };
        req.onsuccess = e => { db = e.target.result; renderList(); };
    }

    function addClient() {
        const name = document.getElementById('newName').value;
        if (!name) return;
        db.transaction("clients", "readwrite").objectStore("clients").add({name}).onsuccess = () => {
            document.getElementById('newName').value = "";
            renderList();
        };
    }

    function renderList() {
        const list = document.getElementById('clientList');
        list.innerHTML = "";
        db.transaction("clients").objectStore("clients").getAll().onsuccess = e => {
            e.target.result.forEach(c => {
                const div = document.createElement('div');
                div.className = `client-item ${currentId === c.id ? 'active-client' : ''}`;
                div.innerText = c.name;
                div.onclick = () => { currentId = c.id; document.getElementById('clientView').style.display='block'; document.getElementById('activeTitle').innerText=c.name; renderList(); renderNotes(); };
                list.appendChild(div);
            });
        };
    }

    function saveNote() {
        const n = { cId: currentId, date: new Date().toLocaleDateString(), s: document.getElementById('s').value, o: document.getElementById('o').value, p: document.getElementById('p').value };
        db.transaction("notes", "readwrite").objectStore("notes").add(n).onsuccess = () => {
            ['s','o','p'].forEach(i => document.getElementById(i).value = "");
            renderNotes();
            alert("Saved");
        };
    }

    function renderNotes() {
        const h = document.getElementById('history');
        h.innerHTML = "<h3>History</h3>";
        db.transaction("notes").objectStore("notes").index("cId").getAll(IDBKeyRange.only(currentId)).onsuccess = e => {
            e.target.result.reverse().forEach(n => {
                h.innerHTML += `<div style="background:#fff; padding:10px; border-left:4px solid var(--accent); margin-top:10px;"><b>${n.date}</b><br>S: ${n.s}</div>`;
            });
        };
    }

    async function exportData() {
        const clients = await new Promise(r => db.transaction("clients").objectStore("clients").getAll().onsuccess = e => r(e.target.result));
        const notes = await new Promise(r => db.transaction("notes").objectStore("notes").getAll().onsuccess = e => r(e.target.result));
        const blob = new Blob([JSON.stringify({clients, notes})], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Backup.json`;
        a.click();
    }
</script>
</body>
</html>
