<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Manager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }
        
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; flex-direction: column; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; }
        #appContent { display: none; height: 100vh; flex-direction: row; width: 100%; }
        
        #sidebar { width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        #clientList { flex-grow: 1; overflow-y: auto; }
        .sidebar-footer { padding: 15px 15px 100px 15px; border-top: 1px solid #eee; background: #fafafa; }
        
        #main { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #workspace { display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; }
        
        /* INPUT COLUMN */
        #inputArea { width: 55%; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; background: #f9f9f9; }
        
        /* HISTORY COLUMN - WITH THE FIX */
        #historyArea { width: 45%; padding: 20px; overflow-y: auto; background: white; }
        
        /* THE "RAISE UP" FIX: This adds empty space at the very bottom of the history list */
        #historyContainer { padding-bottom: 200px; } 

        .history-card { background: #fff; padding: 15px; border-left: 5px solid var(--accent); margin-bottom: 12px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .map-section { background: #eaeff2; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .zone-btn { padding: 12px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-bottom: 5px; width: 100%; }
        
        .soap-card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        textarea { width: 100%; height: 85px; border-radius: 6px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; resize: none; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 16px; }
        
        .btn { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 18px; }
        .btn-danger { background: var(--danger); color: white; width: 100%; font-size: 14px; }
        
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 25px; border-radius: 12px; position: relative; max-height: 80vh; overflow-y: auto; }
        
        .client-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .active-client { background: var(--accent) !important; color: white; }
        label { font-weight: bold; font-size: 12px; color: #7f8c8d; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="text-align: center;">
        <h2>Clinic Access</h2>
        <input type="password" id="pinField" style="padding:15px; text-align:center; font-size:24px; border-radius:8px; width: 220px; border: 1px solid #ccc;" placeholder="PIN" inputmode="numeric">
        <br>
        <button type="button" class="btn" style="width:220px; margin-top:15px; background: var(--accent); color: white;" onclick="checkPin()">UNLOCK</button>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span onclick="closeModal()" style="position:absolute; top:15px; right:15px; font-size:24px; cursor:pointer;">&times;</span>
        <h2 id="modalTitle">Session Details</h2>
        <div id="modalBody"></div>
        <div id="modalFooter"></div>
    </div>
</div>

<div id="appContent">
    <div id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee;">
            <input type="text" id="searchBar" placeholder="Search..." oninput="renderList()" style="width:100%; padding:10px; margin-bottom:8px; border-radius: 5px; border: 1px solid #ddd;">
            <input type="text" id="newName" placeholder="New Client Name" style="width:100%; padding:10px; border-radius: 5px; border: 1px solid #ddd;">
            <button class="btn" style="background:var(--accent); color:white; width:100%; margin-top:5px; padding:10px;" onclick="addClient()">+ Add Client</button>
        </div>
        <div id="clientList"></div>
        <div class="sidebar-footer">
            <button id="deleteBtn" class="btn btn-danger" style="display:none; width:100%;" onclick="deleteClient()">DELETE CLIENT</button>
        </div>
    </div>

    <div id="main">
        <div id="clientView" style="display:none; height: 100%; flex-direction: column;">
            <div style="padding:15px 25px; background:white; border-bottom:1px solid #ddd;">
                <h1 id="activeTitle" style="margin:0;">Client</h1>
            </div>
            
            <div id="workspace">
                <div id="inputArea">
                    <div class="map-section">
                        <div class="map-grid">
                            <div>
                                <button class="zone-btn" onclick="tapZone('Neck')">Neck</button>
                                <button class="zone-btn" onclick="tapZone('Shoulders')">Shoulders</button>
                                <button class="zone-btn" onclick="tapZone('Pecs')">Pecs</button>
                            </div>
                            <div>
                                <button class="zone-btn" onclick="tapZone('Low Back')">Low Back</button>
                                <button class="zone-btn" onclick="tapZone('Glutes')">Glutes</button>
                                <button class="zone-btn" onclick="tapZone('Quads')">Quads</button>
                            </div>
                        </div>
                    </div>

                    <div class="soap-card">
                        <label>S / O</label>
                        <textarea id="s" placeholder="Subjective reports..."></textarea>
                        <textarea id="o" placeholder="Objective findings..."></textarea>
                        <label>A (Tension 1-5)</label>
                        <select onchange="addText('a', 'Tension: ' + this.value + '/5'); this.value='';">
                            <option value="">-- Scale --</option>
                            <option value="1">1 - Minimal</option>
                            <option value="3">3 - Moderate</option>
                            <option value="5">5 - Extreme</option>
                        </select>
                        <textarea id="a"></textarea>
                        <label>P (Homework)</label>
                        <textarea id="p"></textarea>
                        <button class="btn btn-save" onclick="saveNote()">SAVE SESSION</button>
                    </div>
                </div>

                <div id="historyArea">
                    <h3 style="margin-top:0;">History</h3>
                    <div id="historyContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let db, currentId = null, editingNoteId = null;

    function checkPin() {
        if (document.getElementById('pinField').value === '1234') initDB();
        else alert("Wrong PIN");
    }

    function initDB() {
        const req = indexedDB.open("ClinicDB_Final", 3);
        req.onupgradeneeded = e => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("clients")) d.createObjectStore("clients", {keyPath: "id", autoIncrement: true});
            if (!d.objectStoreNames.contains("notes")) d.createObjectStore("notes", {keyPath: "id", autoIncrement: true}).createIndex("cId", "cId");
        };
        req.onsuccess = e => { 
            db = e.target.result; 
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
            renderList(); 
        };
    }

    function renderNotes() {
        const h = document.getElementById('historyContainer');
        h.innerHTML = "";
        if (!currentId) return;
        db.transaction("notes").objectStore("notes").index("cId").getAll(IDBKeyRange.only(currentId)).onsuccess = e => {
            e.target.result.sort((a, b) => b.id - a.id).forEach(n => {
                const noteData = encodeURIComponent(JSON.stringify(n));
                h.innerHTML += `<div class="history-card" onclick="openModal('${noteData}')">
                    <strong>${n.date}</strong><br>
                    <small style="color:#666;">${n.s.substring(0, 40)}...</small>
                </div>`;
            });
        };
    }

    function openModal(noteJson) {
        const n = JSON.parse(decodeURIComponent(noteJson));
        editingNoteId = n.id;
        document.getElementById('modalTitle').innerText = `Edit: ${n.date}`;
        document.getElementById('modalBody').innerHTML = `
            <textarea id="editS">${n.s}</textarea><textarea id="editO">${n.o}</textarea>
            <textarea id="editA">${n.a}</textarea><textarea id="editP">${n.p}</textarea>`;
        document.getElementById('modalFooter').innerHTML = `
            <button class="btn btn-save" onclick="updateNote()">SAVE</button>
            <button class="btn btn-danger" style="margin-top:10px; width:100%;" onclick="deleteNote(${n.id})">DELETE</button>`;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function updateNote() {
        const tx = db.transaction("notes", "readwrite");
        const store = tx.objectStore("notes");
        store.get(editingNoteId).onsuccess = e => {
            const data = e.target.result;
            data.s = document.getElementById('editS').value;
            data.o = document.getElementById('editO').value;
            data.a = document.getElementById('editA').value;
            data.p = document.getElementById('editP').value;
            store.put(data);
        };
        tx.oncomplete = () => { closeModal(); renderNotes(); };
    }

    function deleteNote(id) {
        if(confirm("Delete note?")) {
            const tx = db.transaction("notes", "readwrite");
            tx.objectStore("notes").delete(id);
            tx.oncomplete = () => { closeModal(); renderNotes(); };
        }
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function tapZone(zone) { addText('s', zone + ":"); addText('o', zone + ":"); }
    function addText(id, text) { const el = document.getElementById(id); if (el) el.value += (el.value ? " " : "") + text; }
    function addClient() {
        const name = document.getElementById('newName').value;
        if (!name) return;
        const tx = db.transaction("clients", "readwrite");
        tx.objectStore("clients").add({name});
        tx.oncomplete = () => { document.getElementById('newName').value = ""; renderList(); };
    }
    function renderList() {
        const list = document.getElementById('clientList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = "";
        db.transaction("clients").objectStore("clients").getAll().onsuccess = e => {
            e.target.result.filter(c => c.name.toLowerCase().includes(search)).forEach(c => {
                const div = document.createElement('div');
                div.className = `client-item ${currentId === c.id ? 'active-client' : ''}`;
                div.innerText = c.name;
                div.onclick = () => { currentId = c.id; document.getElementById('clientView').style.display='flex'; document.getElementById('deleteBtn').style.display='block'; document.getElementById('activeTitle').innerText=c.name; renderList(); renderNotes(); };
                list.appendChild(div);
            });
        };
    }
    function saveNote() {
        const n = { 
            cId: currentId, date: new Date().toLocaleDateString(), 
            s: document.getElementById('s').value, o: document.getElementById('o').value, 
            a: document.getElementById('a').value, p: document.getElementById('p').value 
        };
        const tx = db.transaction("notes", "readwrite");
        tx.objectStore("notes").add(n);
        tx.oncomplete = () => { ['s','o','a','p'].forEach(i => document.getElementById(i).value = ""); renderNotes(); alert("Saved"); };
    }
</script>
</body>
</html>
