<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Clinical Manager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; flex-direction: column; position: relative; z-index: 100; }
        #appContent { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #main { flex-grow: 1; padding: 25px; overflow-y: auto; padding-bottom: 150px; }
        .map-section { background: #eaeff2; padding: 15px; border-radius: 12px; margin-bottom: 20px; max-width: 850px; margin: 0 auto; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .zone-col { display: flex; flex-direction: column; gap: 6px; }
        .zone-btn { padding: 10px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--primary); }
        .zone-btn:active { background: var(--accent); color: white; }
        .soap-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto; }
        textarea { width: 100%; height: 80px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 18px; }
        .btn-danger { background: var(--danger); color: white; width: 100%; font-size: 12px; margin-top: auto; }
        .client-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .active-client { background: var(--accent) !important; color: white; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>Clinic Access</h2>
    <input type="password" id="pinField" style="padding:15px; text-align:center; font-size:24px; border-radius:8px;" placeholder="PIN" inputmode="numeric" onkeydown="if(event.key==='Enter') checkPin()">
    <button class="btn" style="width:150px; margin-top:10px;" onclick="checkPin()">Unlock</button>
</div>

<div id="appContent">
    <div id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee;">
            <input type="text" id="searchBar" placeholder="Search..." oninput="renderList()" style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="text" id="newName" placeholder="New Client" style="width:100%; padding:8px;">
            <button class="btn" style="background:var(--accent); color:white; width:100%; margin-top:5px;" onclick="addClient()">+ Add Client</button>
        </div>
        <div id="clientList" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div style="padding:10px; display:flex; flex-direction:column; gap:5px; border-top:1px solid #eee;">
            <button id="deleteBtn" class="btn btn-danger" style="display:none;" onclick="deleteClient()">Delete Active Client</button>
            <button class="btn" style="font-size:10px; background:#ddd;" onclick="exportData()">💾 Backup Data</button>
        </div>
    </div>

    <div id="main">
        <div id="clientView" style="display:none;">
            <h1 id="activeTitle" style="margin-top:0;">Client</h1>
            
            <div class="map-section">
                <div class="map-grid">
                    <div class="zone-col">
                        <span style="font-size:10px; text-align:center; font-weight:bold; color:#7f8c8d;">ANTERIOR (FRONT)</span>
                        <button class="zone-btn" onclick="tapZone('Neck (Ant)')">Neck</button>
                        <button class="zone-btn" onclick="tapZone('Pecs')">Pecs/Chest</button>
                        <button class="zone-btn" onclick="tapZone('Deltoids (Ant)')">Shoulders</button>
                        <button class="zone-btn" onclick="tapZone('Abs/Psoas')">Abs/Psoas</button>
                        <button class="zone-btn" onclick="tapZone('Forearms (Flex)')">Forearms</button>
                        <button class="zone-btn" onclick="tapZone('Quads')">Quads</button>
                        <button class="zone-btn" onclick="tapZone('Tibialis Ant')">Shins</button>
                    </div>
                    <div class="zone-col">
                        <span style="font-size:10px; text-align:center; font-weight:bold; color:#7f8c8d;">POSTERIOR (BACK)</span>
                        <button class="zone-btn" onclick="tapZone('Upper Traps')">Upper Traps</button>
                        <button class="zone-btn" onclick="tapZone('Rhomboids/Scap')">Rhomboids/Scapula</button>
                        <button class="zone-btn" onclick="tapZone('Lats')">Lats</button>
                        <button class="zone-btn" onclick="tapZone('Erectors/Low Back')">Low Back</button>
                        <button class="zone-btn" onclick="tapZone('Glutes')">Glutes</button>
                        <button class="zone-btn" onclick="tapZone('Hamstrings')">Hamstrings</button>
                        <button class="zone-btn" onclick="tapZone('Calves')">Calves</button>
                    </div>
                </div>
            </div>

            <div class="soap-card">
                <label>Treatment Type</label>
                <select onchange="addText('a', 'Modality: ' + this.value); this.value='';">
                    <option value="">-- Select Type --</option>
                    <option value="Relaxation">Relaxation</option>
                    <option value="Therapeutic">Therapeutic</option>
                    <option value="Deep Tissue">Deep Tissue</option>
                    <option value="Injury Recovery">Injury Recovery</option>
                </select>

                <label>S (Subjective)</label>
                <select onchange="addText('s', this.value); this.value='';">
                    <option value="">-- Quick S --</option>
                    <option value="Reports localized discomfort.">Discomfort</option>
                    <option value="Reports chronic pain patterns.">Chronic Pain</option>
                    <option value="Seeking injury recovery.">Injury Recovery</option>
                    <option value="Reports limited ROM and stiffness.">Limited ROM</option>
                </select>
                <textarea id="s" placeholder="Client reports..."></textarea>

                <label>O (Objective)</label>
                <select onchange="addText('o', this.value); this.value='';">
                    <option value="">-- Quick O --</option>
                    <option value="Work focused on releasing tension.">Release Tension</option>
                    <option value="Significant adhesions noted/addressed.">Adhesions</option>
                    <option value="Hypertonicity palpated in target area.">Hypertonicity</option>
                    <option value="Active trigger points released.">Trigger Points</option>
                </select>
                <textarea id="o" placeholder="Findings..."></textarea>

                <label>A (Assessment - Tension 1-5)</label>
                <select onchange="addText('a', 'Found Level ' + this.value + ' tension.'); this.value='';">
                    <option value="">-- Tension Scale --</option>
                    <option value="1">1 - Minimal</option>
                    <option value="2">2 - Mild</option>
                    <option value="3">3 - Moderate</option>
                    <option value="4">4 - High</option>
                    <option value="5">5 - Extreme</option>
                </select>
                <textarea id="a" placeholder="Session summary..."></textarea>

                <label>P (Plan)</label>
                <select onchange="addText('p', this.value); this.value='';">
                    <option value="">-- Quick P --</option>
                    <option value="Advised increased hydration.">Hydrate</option>
                    <option value="Recommended specific stretching.">Stretch</option>
                    <option value="Suggested Epsom salt soak.">Epsom Salt</option>
                    <option value="Follow up scheduled.">Follow Up</option>
                </select>
                <textarea id="p" placeholder="Homework..."></textarea>

                <button class="btn btn-save" onclick="saveNote()">SAVE SESSION</button>
            </div>
            <div id="history"></div>
        </div>
