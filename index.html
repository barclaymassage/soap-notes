<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Manager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; flex-direction: column; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; }
        #appContent { display: none; height: 100vh; flex-direction: row; width: 100%; }
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; height: 100vh; }
        #clientList { flex-grow: 1; overflow-y: auto; }
        .sidebar-footer { padding: 15px 15px 90px 15px; border-top: 1px solid #eee; background: #fafafa; }
        #main { flex-grow: 1; padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 25px; border-radius: 12px; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: var(--primary); }
        
        .history-card { background: #fff; padding: 15px; border-left: 5px solid var(--accent); margin-top: 10px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .history-card:active { background: #eef2f3; }

        .map-section { background: #eaeff2; padding: 15px; border-radius: 12px; margin-bottom: 20px; max-width: 850px; margin: 0 auto 20px auto; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .zone-col { display: flex; flex-direction: column; gap: 6px; }
        .zone-btn { padding: 14px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; color: var(--primary); }
        .zone-btn:active { background: var(--accent); color: white; }
        
        .soap-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto; }
        textarea { width: 100%; height: 90px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 16px; }
        
        .btn { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 18px; }
        .btn-danger { background: var(--danger); color: white; width: 100%; font-size: 14px; margin-bottom: 10px; }
        .btn-edit { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        
        .client-item { padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .active-client { background: var(--accent) !important; color: white; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="text-align: center;">
        <h2>Clinic Access</h2>
        <input type="password" id="pinField" style="padding:15px; text-align:center; font-size:24px; border-radius:8px; width: 220px; border: 1px solid #ccc;" placeholder="PIN" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter') checkPin()">
        <br>
        <button type="button" id="unlockBtn" class="btn" style="width:220px; margin-top:15px; background: var(--accent); color: white;" onclick="checkPin()">UNLOCK</button>
        <p id="loadMsg" style="display:none; color:#3498db; margin-top:10px;">Connecting...</p>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Session Details</h2>
        <div id="modalBody"></div>
        <div id="modalFooter"></div>
    </div>
</div>

<div id="appContent">
    <div id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee;">
            <input type="text" id="searchBar" placeholder="Search..." oninput="renderList()" style="width:100%; padding:12px; margin-bottom:8px; border-radius: 5px; border: 1px solid #ddd;">
            <input type="text" id="newName" placeholder="New Client Name" style="width:100%; padding:12px; border-radius: 5px; border: 1px solid #ddd;">
            <button class="btn" style="background:var(--accent); color:white; width:100%; margin-top:5px;" onclick="addClient()">+ Add Client</button>
        </div>
        <div id="clientList"></div>
        <div class="sidebar-footer">
            <button id="deleteBtn" class="btn btn-danger" style="display:none; width:100%;" onclick="deleteClient()">DELETE CLIENT</button>
            <button class="btn" style="width:100%; font-size:11px; background:#ccc;" onclick="exportData()">💾 BACKUP ALL DATA</button>
        </div>
    </div>
    <div id="main">
        <div id="clientView" style="display:none;">
            <h1 id="activeTitle" style="margin-top:0;">Client</h1>
            <div class="map-section">
                <div class="map-grid">
                    <div class="zone-col">
                        <span style="font-size:10px; text-align:center; font-weight:bold; color:#7f8c8d;">ANTERIOR (FRONT)</span>
                        <button class="zone-btn" onclick="tapZone('Neck (Ant)')">Neck</button>
                        <button class="zone-btn" onclick="tapZone('Pecs')">Pecs/Chest</button>
                        <button class="zone-btn" onclick="tapZone('Deltoids (Ant)')">Shoulders</button>
                        <button class="zone-btn" onclick="tapZone('Abs/Psoas')">Abs/Psoas</button>
                        <button class="zone-btn" onclick="tapZone('Forearms (Flex)')">Forearms</button>
                        <button class="zone-btn" onclick="tapZone('Quads')">Quads</button>
                        <button class="zone-btn" onclick="tapZone('Tibialis Ant')">Shins</button>
                    </div>
                    <div class="zone-col">
                        <span style="font-size:10px; text-align:center; font-weight:bold; color:#7f8c8d;">POSTERIOR (BACK)</span>
                        <button class="zone-btn" onclick="tapZone('Upper Traps')">Upper Traps</button>
                        <button class="zone-btn" onclick="tapZone('Rhomboids/Scap')">Rhomboids/Scapula</button>
                        <button class="zone-btn" onclick="tapZone('Lats')">Lats</button>
                        <button class="zone-btn" onclick="tapZone('Erectors/Low Back')">Low Back</button>
                        <button class="zone-btn" onclick="tapZone('Glutes')">Glutes</button>
                        <button class="zone-btn" onclick="tapZone('Hamstrings')">Hamstrings</button>
                        <button class="zone-btn" onclick="tapZone('Calves')">Calves</button>
                    </div>
                </div>
            </div>
            <div class="soap-card">
                <label>Treatment Type</label>
                <select onchange="addText('a', 'Type: ' + this.value); this.value='';">
                    <option value="">-- Select Type --</option>
                    <option value="Relaxation">Relaxation</option>
                    <option value="Therapeutic">Therapeutic</option>
                    <option value="Deep Tissue">Deep Tissue</option>
                    <option value="Injury Recovery">Injury Recovery</option>
                </select>
                <label>S (Subjective)</label>
                <textarea id="s" placeholder="Client reports..."></textarea>
                <label>O (Objective)</label>
                <textarea id="o" placeholder="Findings..."></textarea>
                <label>A (Assessment - Tension 1-5)</label>
                <select onchange="addText('a', 'Tension Found: ' + this.value + '/5.'); this.value='';">
                    <option value="">-- Tension Scale --</option>
                    <option value="1">1 - Minimal</option>
                    <option value="2">2 - Mild</option>
                    <option value="3">3 - Moderate</option>
                    <option value="4">4 - High</option>
                    <option value="5">5 - Extreme</option>
                </select>
                <textarea id="a" placeholder="Summary..."></textarea>
                <label>P (Plan)</label>
                <textarea id="p" placeholder="Homework..."></textarea>
                <button class="btn btn-save" onclick="saveNote()">SAVE SESSION</button>
            </div>
            <div id="history"></div>
        </div>
    </div>
</div>

<script>
    let db, currentId = null, editingNoteId = null;

    function checkPin() {
        if (document.getElementById('pinField').value === '1234') {
            document.getElementById('loadMsg').style.display = 'block';
            initDB();
        } else { alert("Wrong PIN"); }
    }

    function initDB() {
        // Bumped version to 2 to force the index creation
        const req = indexedDB.open("ClinicDB_Final", 2);
        
        req.onupgradeneeded = e => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("clients")) d.createObjectStore("clients", {keyPath: "id", autoIncrement: true});
            if (!d.objectStoreNames.contains("notes")) {
                let noteStore = d.createObjectStore("notes", {keyPath: "id", autoIncrement: true});
                noteStore.createIndex("cId", "cId");
            } else {
                let noteStore = e.target.transaction.objectStore("notes");
                if (!noteStore.indexNames.contains("cId")) noteStore.createIndex("cId", "cId");
            }
        };

        req.onsuccess = e => { 
            db = e.target.result; 
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
            renderList(); 
        };
    }

    function openModal(noteJson) {
        const n = JSON.parse(decodeURIComponent(noteJson));
        editingNoteId = n.id;
        document.getElementById('modalTitle').innerText = `Session: ${n.date}`;
        document.getElementById('modalBody').innerHTML = `
            <label>S</label><textarea id="editS">${n.s}</textarea>
            <label>O</label><textarea id="editO">${n.o}</textarea>
            <label>A</label><textarea id="editA">${n.a}</textarea>
            <label>P</label><textarea id="editP">${n.p}</textarea>
        `;
        document.getElementById('modalFooter').innerHTML = `
            <button class="btn btn-save" onclick="updateNote()">SAVE CHANGES</button>
            <button class="btn btn-danger" style="margin-top:10px; width:100%;" onclick="deleteNote(${n.id})">DELETE ACCIDENTAL NOTE</button>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function updateNote() {
        const tx = db.transaction("notes", "readwrite");
        const store = tx.objectStore("notes");
        store.get(editingNoteId).onsuccess = e => {
            const data = e.target.result;
            data.s = document.getElementById('editS').value;
            data.o = document.getElementById('editO').value;
            data.a = document.getElementById('editA').value;
            data.p = document.getElementById('editP').value;
            store.put(data);
        };
        tx.oncomplete = () => { closeModal(); renderNotes(); };
    }

    function deleteNote(id) {
        if(confirm("Permanently delete this accidental note?")) {
            const tx = db.transaction("notes", "readwrite");
            tx.objectStore("notes").delete(id);
            tx.oncomplete = () => { closeModal(); renderNotes(); };
        }
    }

    function tapZone(zone) { addText('s', zone + ":"); addText('o', zone + ":"); }
    function addText(id, text) { const el = document.getElementById(id); if (el) el.value += (el.value ? " " : "") + text; }

    function addClient() {
        const name = document.getElementById('newName').value;
        if (!name) return;
        const tx = db.transaction("clients", "readwrite");
        tx.objectStore("clients").add({name});
        tx.oncomplete = () => { document.getElementById('newName').value = ""; renderList(); };
    }

    function renderList() {
        const list = document.getElementById('clientList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = "";
        db.transaction("clients").objectStore("clients").getAll().onsuccess = e => {
            e.target.result.filter(c => c.name.toLowerCase().includes(search)).forEach(c => {
                const div = document.createElement('div');
                div.className = `client-item ${currentId === c.id ? 'active-client' : ''}`;
                div.innerText = c.name;
                div.onclick = () => { 
                    currentId = c.id; 
                    document.getElementById('clientView').style.display='block'; 
                    document.getElementById('deleteBtn').style.display='block'; 
                    document.getElementById('activeTitle').innerText=c.name; 
                    renderList(); renderNotes(); 
                };
                list.appendChild(div);
            });
        };
    }

    function deleteClient() {
        if (!currentId || !confirm("Delete client and all history?")) return;
        const tx = db.transaction(["clients", "notes"], "readwrite");
        tx.objectStore("clients").delete(currentId);
        const notesStore = tx.objectStore("notes");
        notesStore.index("cId").openCursor(IDBKeyRange.only(currentId)).onsuccess = e => {
            const cursor = e.target.result; if (cursor) { cursor.delete(); cursor.continue(); }
        };
        tx.oncomplete = () => { currentId = null; document.getElementById('clientView').style.display = 'none'; document.getElementById('deleteBtn').style.display = 'none'; renderList(); };
    }

    function saveNote() {
        const n = { 
            cId: currentId, date: new Date().toLocaleDateString(), 
            s: document.getElementById('s').value, o: document.getElementById('o').value, 
            a: document.getElementById('a').value, p: document.getElementById('p').value 
        };
        const tx = db.transaction("notes", "readwrite");
        tx.objectStore("notes").add(n);
        tx.oncomplete = () => { ['s','o','a','p'].forEach(i => document.getElementById(i).value = ""); renderNotes(); alert("Saved"); };
    }

    function renderNotes() {
        const h = document.getElementById('history');
        h.innerHTML = "<h3>Session History (Click to Edit)</h3>";
        if (!currentId) return;

        const store = db.transaction("notes").objectStore("notes");
        const index = store.index("cId");
        
        index.getAll(IDBKeyRange.only(currentId)).onsuccess = e => {
            const notes = e.target.result;
            notes.sort((a, b) => b.id - a.id).forEach(n => {
                const noteData = encodeURIComponent(JSON.stringify(n));
                h.innerHTML += `<div class="history-card" onclick="openModal('${noteData}')"><strong>${n.date}</strong><br><small>${n.s.substring(0, 40)}...</small></div>`;
            });
        };
    }

    async function exportData() {
        const clients = await new Promise(r => db.transaction("clients").objectStore("clients").getAll().onsuccess = e => r(e.target.result));
        const notes = await new Promise(r => db.transaction("notes").objectStore("notes").getAll().onsuccess = e => r(e.target.result));
        const blob = new Blob([JSON.stringify({clients, notes})], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Clinical_Backup.json`;
        a.click();
    }
</script>
</body>
</html>
